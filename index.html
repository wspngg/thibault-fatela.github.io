<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thibault Fatela — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080400;
  --bg2:#110800;
  --orange:#FF6B2B;
  --orange2:#E8490F;
  --orange3:#FF9B6B;
  --amber:#FFD166;
  --cream:#FFF8F0;
  --cream2:rgba(255,248,240,.72);
  --cream3:rgba(255,248,240,.38);
  --cream4:rgba(255,248,240,.1);
  --border:rgba(255,107,43,.18);
  --border2:rgba(255,248,240,.07);
  --glow:0 0 50px rgba(255,107,43,.3);
  --ff-d:'Cormorant Garamond',serif;
  --ff-s:'Syne',sans-serif;
  --ff-m:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--cream);font-family:var(--ff-s);-webkit-font-smoothing:antialiased;cursor:none;user-select:none}

/* CURSOR */
#cur{position:fixed;z-index:9999;pointer-events:none;top:0;left:0}
#cdot{position:absolute;width:7px;height:7px;background:var(--orange);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--orange);transition:width .15s,height .15s}
#cring{position:absolute;width:38px;height:38px;border:1px solid rgba(255,107,43,.45);border-radius:50%;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s}
body.hov #cdot{width:3px;height:3px}
body.hov #cring{width:58px;height:58px;border-color:rgba(255,107,43,.75)}

/* CANVAS */
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* GRAIN */
body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:.45}

/* VIGNETTE */
body::before{content:"";position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(8,4,0,.65) 100%)}

/* LOADER */
#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.ldr-tag{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.38em;text-transform:uppercase;color:var(--orange);margin-bottom:2.8rem;opacity:0;animation:fuA .6s .2s ease forwards}
.ldr-name{font-family:var(--ff-d);font-size:clamp(4rem,11vw,9rem);font-weight:300;line-height:.85;text-align:center;letter-spacing:-.02em}
.ldr-n1{display:block;color:var(--cream);clip-path:inset(0 0 100% 0);animation:clipUp .8s .35s cubic-bezier(.16,1,.3,1) forwards}
.ldr-n2{display:block;font-style:italic;color:var(--orange);clip-path:inset(0 0 100% 0);animation:clipUp .8s .55s cubic-bezier(.16,1,.3,1) forwards;text-shadow:0 0 50px rgba(255,107,43,.4)}
@keyframes clipUp{to{clip-path:inset(0 0 0% 0)}}
@keyframes fuA{to{opacity:1}}
.ldr-barwrap{margin-top:3.5rem;width:250px;opacity:0;animation:fuA .5s .9s forwards}
.ldr-bar{height:1px;background:rgba(255,107,43,.12);overflow:hidden;position:relative}
.ldr-fill{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--orange2),var(--orange),var(--amber));background-size:250% 100%;animation:gradSlide 2s linear infinite;box-shadow:0 0 12px var(--orange);transition:width .08s}
.ldr-fill::after{content:"";position:absolute;right:-1px;top:-3px;width:7px;height:7px;background:var(--amber);border-radius:50%;box-shadow:0 0 10px var(--amber)}
@keyframes gradSlide{0%{background-position:100%}100%{background-position:0%}}
.ldr-info{display:flex;justify-content:space-between;margin-top:.55rem}
.ldr-stage{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.15em;color:var(--cream3)}
.ldr-pct{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.12em;color:var(--orange);opacity:.7}

/* TUTORIAL */
#tut{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:rgba(8,4,0,.9);backdrop-filter:blur(18px);opacity:0;pointer-events:none;transition:opacity .5s}
#tut.show{opacity:1;pointer-events:all}
.tut-box{padding:3.5rem;background:rgba(255,107,43,.06);border:1px solid rgba(255,107,43,.2);display:flex;flex-direction:column;align-items:center;gap:2.5rem;max-width:420px;width:90%;position:relative}
.tc{position:absolute;width:18px;height:18px;border-color:var(--orange);border-style:solid}
.tc.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.tc.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.tut-h{font-family:var(--ff-d);font-size:2rem;font-weight:300;text-align:center;line-height:1.15}
.tut-h em{font-style:italic;color:var(--orange)}
.tut-keys{display:flex;align-items:center;gap:2rem}
.tut-key{display:flex;flex-direction:column;align-items:center;gap:.65rem}
.kc{width:46px;height:46px;border:1px solid rgba(255,248,240,.14);display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(255,107,43,.04)}
.kc.p1{animation:kp 2s ease infinite}
.kc.p2{animation:kp 2s ease .45s infinite}
@keyframes kp{0%,100%{border-color:rgba(255,248,240,.14)}50%{border-color:rgba(255,107,43,.55);box-shadow:0 0 18px rgba(255,107,43,.25)}}
.kl{font-family:var(--ff-m);font-size:.5rem;letter-spacing:.2em;color:var(--cream3)}
.tut-sep{font-family:var(--ff-m);font-size:.55rem;color:var(--cream3)}
.tut-hint{font-family:var(--ff-m);font-size:.5rem;letter-spacing:.18em;color:rgba(255,107,43,.35);text-align:center}
.tut-btn{padding:.85rem 2.6rem;background:linear-gradient(135deg,var(--orange2),var(--orange));color:var(--cream);font-family:var(--ff-s);font-size:.76rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:none;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));box-shadow:0 0 30px rgba(255,107,43,.25);transition:box-shadow .2s}
.tut-btn:hover{box-shadow:0 0 50px rgba(255,107,43,.5)}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:1.7rem 2.8rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--ff-d);font-size:1.05rem;font-weight:400;color:var(--cream);letter-spacing:.04em;display:flex;align-items:center;gap:.7rem}
.nav-dot{width:7px;height:7px;background:var(--orange);border-radius:50%;box-shadow:0 0 10px var(--orange);animation:breathe 2.5s ease infinite;flex-shrink:0}
@keyframes breathe{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.55);opacity:.4}}
.nav-right{display:flex;align-items:center;gap:1.4rem}
.nav-num{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.2em;color:var(--cream3)}
.nav-num span{color:var(--orange);font-weight:500}
.nav-bar{width:55px;height:1px;background:rgba(255,107,43,.12);position:relative;overflow:hidden}
.nav-prog{position:absolute;inset:0;background:var(--orange);width:12.5%;transition:width .6s cubic-bezier(.16,1,.3,1);box-shadow:0 0 8px var(--orange)}

/* SLIDES */
#slides{position:fixed;inset:0;z-index:10;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:5.5rem 3rem 4.5rem;opacity:0;visibility:hidden;pointer-events:none;will-change:transform,opacity}
.slide.is-active{opacity:1;visibility:visible;pointer-events:all}
.slide-inner{max-width:1300px;width:100%;height:100%;display:flex;align-items:center}

/* DOTS */
#dots{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:500;display:flex;gap:.6rem;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,248,240,.12);transition:all .4s cubic-bezier(.16,1,.3,1);cursor:none}
.dot.on{background:var(--orange);width:20px;border-radius:3px;box-shadow:0 0 9px var(--orange)}

/* ARROWS */
.arr{position:fixed;top:50%;z-index:500;width:46px;height:46px;border:1px solid rgba(255,107,43,.18);display:flex;align-items:center;justify-content:center;cursor:none;font-size:.95rem;color:var(--cream2);background:rgba(255,107,43,.04);backdrop-filter:blur(10px);transition:all .3s;transform:translateY(-50%)}
.arr:hover{border-color:var(--orange);background:rgba(255,107,43,.12);box-shadow:var(--glow);color:var(--cream)}
#al{left:1.2rem}#ar{right:1.2rem}
.arr.off{opacity:.2;pointer-events:none}

/* CHIP LABEL */
.chip{display:inline-flex;align-items:center;gap:.7rem;font-family:var(--ff-m);font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,107,43,.55);margin-bottom:1.4rem}
.chip::before{content:"";width:20px;height:1px;background:var(--orange);box-shadow:0 0 6px var(--orange)}

/* GLASS */
.g1{background:rgba(255,107,43,.05);backdrop-filter:blur(30px);border:1px solid rgba(255,107,43,.13);position:relative;overflow:hidden}
.g1::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,248,240,.03),transparent 55%);pointer-events:none}
.g2{background:rgba(255,248,240,.025);border:1px solid rgba(255,248,240,.06);backdrop-filter:blur(20px)}
.ggold{background:linear-gradient(135deg,rgba(255,107,43,.1),rgba(232,73,15,.05));border:1px solid rgba(255,107,43,.22);box-shadow:0 0 35px rgba(255,107,43,.07),inset 0 1px 0 rgba(255,248,240,.05)}

/* REVEAL ANIMATIONS */
.rv{opacity:0;transform:translateY(22px)}
.rv.in{transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);opacity:1;transform:translateY(0)}
.rvL{opacity:0;transform:translateX(-28px)}
.rvL.in{transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);opacity:1;transform:translateX(0)}
.rvR{opacity:0;transform:translateX(28px)}
.rvR.in{transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);opacity:1;transform:translateX(0)}
.d1{transition-delay:.04s!important}.d2{transition-delay:.1s!important}.d3{transition-delay:.17s!important}
.d4{transition-delay:.24s!important}.d5{transition-delay:.31s!important}.d6{transition-delay:.38s!important}
.d7{transition-delay:.45s!important}.d8{transition-delay:.52s!important}

/* ══ S1 HERO ══ */
.s1w{display:grid;grid-template-columns:1fr 300px;gap:4rem;align-items:center;width:100%}
.s1-eye{font-family:var(--ff-m);font-size:.58rem;letter-spacing:.32em;text-transform:uppercase;color:var(--orange);margin-bottom:1.4rem;display:flex;align-items:center;gap:.75rem}
.s1-eye::after{content:"";width:50px;height:1px;background:linear-gradient(90deg,var(--orange),transparent)}
.s1-title{font-family:var(--ff-d);font-size:clamp(5rem,12vw,11rem);line-height:.83;font-weight:300;letter-spacing:-.025em}
.s1-n{display:block;color:var(--cream)}
.s1-i{display:block;font-style:italic;color:var(--orange);text-shadow:0 0 55px rgba(255,107,43,.4);position:relative}
.s1-i::after{content:"Fatela";position:absolute;inset:0;color:transparent;-webkit-text-stroke:1px rgba(255,107,43,.12);transform:translate(3px,3px);pointer-events:none}
.s1-sub{font-family:var(--ff-m);font-size:.68rem;letter-spacing:.1em;color:var(--cream3);margin-top:2rem;line-height:2.1}
.s1-sub b{color:var(--orange3);font-weight:400}
.s1-cta{margin-top:2.5rem;display:inline-flex;align-items:center;gap:1rem;font-family:var(--ff-m);font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream3);cursor:none}
.s1-box{width:40px;height:40px;border:1px solid rgba(255,107,43,.3);display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .3s;position:relative;overflow:hidden}
.s1-box::before{content:"";position:absolute;inset:0;background:var(--orange);transform:scaleY(0);transform-origin:bottom;transition:transform .3s;z-index:-1}
.s1-cta:hover .s1-box{border-color:var(--orange);box-shadow:var(--glow)}
.s1-cta:hover .s1-box::before{transform:scaleY(1)}
.s1-stack{display:flex;flex-direction:column;gap:1px}
.s1-card{padding:1.45rem 1.9rem;transition:background .3s,border-color .3s,transform .25s}
.s1-card:hover{background:rgba(255,107,43,.1);border-color:rgba(255,107,43,.28);transform:translateX(5px)}
.s1-cl{font-family:var(--ff-m);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,107,43,.42);margin-bottom:.32rem}
.s1-cv{font-size:.88rem;font-weight:600;color:var(--cream)}
.s1-yr{position:absolute;bottom:4rem;right:2.5rem;font-family:var(--ff-d);font-size:9rem;font-weight:300;font-style:italic;color:rgba(255,107,43,.035);line-height:1;pointer-events:none;letter-spacing:-.02em}

/* ══ S2 PROFIL ══ */
.s2w{display:grid;grid-template-columns:260px 1fr;gap:5rem;align-items:center;width:100%}
.s2-vis{position:relative;width:260px;height:260px;flex-shrink:0}
.s2-blob{position:absolute;inset:0;background:radial-gradient(circle at 40% 38%,rgba(255,107,43,.18),rgba(232,73,15,.07) 50%,transparent 70%);border:1px solid rgba(255,107,43,.2);border-radius:30% 70% 70% 30%/30% 30% 70% 70%;animation:blobAnim 9s ease infinite alternate;box-shadow:0 0 50px rgba(255,107,43,.08)}
@keyframes blobAnim{0%{border-radius:30% 70% 70% 30%/30% 30% 70% 70%}33%{border-radius:70% 30% 30% 70%/70% 70% 30% 30%}66%{border-radius:50% 50% 30% 70%/60% 40% 60% 40%}100%{border-radius:30% 70% 50% 50%/40% 60% 40% 60%}}
.s2-init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-size:5.5rem;font-style:italic;font-weight:300;color:var(--orange);text-shadow:0 0 35px rgba(255,107,43,.5);z-index:2}
.s2-orb{position:absolute;inset:-30px;border:1px dashed rgba(255,107,43,.1);border-radius:50%;animation:orbSpin 14s linear infinite}
.s2-orb-dot{position:absolute;top:0;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--orange);border-radius:50%;box-shadow:0 0 12px var(--orange)}
.s2-orb2{position:absolute;inset:-58px;border:1px dashed rgba(255,107,43,.06);border-radius:50%;animation:orbSpin 22s linear infinite reverse}
@keyframes orbSpin{to{transform:rotate(360deg)}}
.s2-intro{font-family:var(--ff-d);font-size:clamp(1.05rem,1.8vw,1.5rem);font-weight:300;line-height:1.78;color:var(--cream2);margin-bottom:2.5rem}
.s2-intro em{font-style:italic;color:var(--orange)}
.s2-rows{display:flex;flex-direction:column}
.row{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1rem;border-bottom:1px solid rgba(255,248,240,.04);margin:0 -1rem;transition:background .2s}
.row:first-child{border-top:1px solid rgba(255,248,240,.04)}
.row:hover{background:rgba(255,107,43,.04)}
.rk{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.17em;text-transform:uppercase;color:var(--cream3)}
.rv-val{font-size:.88rem;font-weight:600;color:var(--cream)}.rv-val span{color:var(--orange)}

/* ══ S3 COLAS ══ */
.s3w{display:grid;grid-template-columns:1fr 1.55fr;gap:4rem;align-items:start;width:100%}
.s3-logobox{width:180px;margin-bottom:2rem;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:center}
.s3-logobox img{width:100%;height:auto;display:block}
.s3-name{font-family:var(--ff-d);font-size:clamp(2.5rem,5vw,4rem);font-weight:300;line-height:.9;margin-bottom:1.5rem}
.s3-name em{font-style:italic;color:var(--orange)}
.s3-body{font-size:.84rem;line-height:1.9;color:var(--cream2);font-weight:300;margin-bottom:1.5rem}
.s3-body b{color:var(--cream);font-weight:600}
.s3-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,107,43,.06)}
.s3-st{padding:1.35rem;background:rgba(8,4,0,.55)}
.s3-sn{font-family:var(--ff-d);font-size:2.5rem;font-weight:300;color:var(--orange);line-height:1;text-shadow:0 0 18px rgba(255,107,43,.35)}
.s3-sl{font-family:var(--ff-m);font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cream3);margin-top:.28rem}
.s3-cards{display:flex;flex-direction:column;gap:1.5rem}
.s3-card{padding:2rem 2.4rem;transition:border-color .3s,background .3s,transform .25s}
.s3-card:hover{border-color:rgba(255,107,43,.25);background:rgba(255,107,43,.07);transform:translateX(-4px)}
.s3-ct{font-size:.9rem;font-weight:700;color:var(--cream);margin-bottom:.7rem}
.s3-ct span{color:var(--orange)}
.s3-cd{font-size:.8rem;line-height:1.88;color:var(--cream2);font-weight:300}
.s3-cd b{color:var(--cream);font-weight:600}

/* ══ S4 MISSIONS ══ */
.s4w{width:100%}
.s4-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem}
.s4-title{font-family:var(--ff-d);font-size:clamp(3rem,6vw,5.5rem);font-weight:300;line-height:.88}
.s4-title em{font-style:italic;color:var(--orange)}
.s4-meta{font-family:var(--ff-m);font-size:.55rem;letter-spacing:.14em;color:var(--cream3);text-align:right;line-height:2}
.s4-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,107,43,.05)}
.s4-cell{padding:2.2rem 2rem;background:rgba(8,4,0,.65);border-top:2px solid transparent;transition:all .3s;position:relative;overflow:hidden}
.s4-cell::before{content:"";position:absolute;bottom:0;left:0;right:0;height:0;background:linear-gradient(to top,rgba(255,107,43,.06),transparent);transition:height .4s}
.s4-cell:hover{border-top-color:var(--orange)}.s4-cell:hover::before{height:100%}
.s4-n{font-family:var(--ff-d);font-size:2.8rem;font-weight:300;font-style:italic;color:rgba(255,107,43,.1);line-height:1;margin-bottom:.8rem;transition:color .3s}
.s4-cell:hover .s4-n{color:rgba(255,107,43,.35)}
.s4-t{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cream);margin-bottom:.5rem}
.s4-d{font-size:.76rem;line-height:1.82;color:var(--cream3);font-weight:300}

/* ══ S5 BOUYGUES ══ */
.s5w{width:100%;display:flex;flex-direction:column;gap:2.5rem}
.s5-top{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.s5-big{font-family:var(--ff-d);font-size:clamp(3rem,7vw,6.5rem);font-weight:300;line-height:.85}
.s5-big em{font-style:italic;color:var(--orange)}
.s5-desc{font-family:var(--ff-d);font-size:clamp(.95rem,1.7vw,1.25rem);font-weight:300;line-height:1.78;color:var(--cream2)}
.s5-desc b{color:var(--cream);font-weight:600}
.s5-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,107,43,.07)}
.s5-stat{padding:2rem;background:rgba(8,4,0,.75);text-align:center;transition:background .3s}
.s5-stat:hover{background:rgba(255,107,43,.09)}
.s5-sn{font-family:var(--ff-d);font-size:3rem;font-weight:300;color:var(--orange);line-height:1;text-shadow:0 0 22px rgba(255,107,43,.38)}
.s5-sl{font-family:var(--ff-m);font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cream3);margin-top:.35rem}
.s5-branches{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
.s5-br{padding:1.35rem 1rem;text-align:center;transition:all .3s}
.s5-br:hover{background:rgba(255,107,43,.07);border-color:rgba(255,107,43,.2)}
.s5-icon{width:36px;height:36px;margin:0 auto .6rem;display:flex;align-items:center;justify-content:center}
.s5-icon svg{width:100%;height:100%}
.s5-bt{font-size:.72rem;font-weight:700;color:var(--cream);letter-spacing:.03em;margin-bottom:.22rem}
.s5-bd{font-size:.64rem;color:var(--cream3)}

/* ══ S6 JLF ══ */

<script>
/* THREE.JS */
(()=>{
  const cv=document.getElementById('bgc');
  const W=innerWidth,H=innerHeight;
  const R=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  R.setPixelRatio(Math.min(devicePixelRatio,2));R.setSize(W,H);R.setClearColor(0,0);
  const SC=new THREE.Scene();
  const CM=new THREE.PerspectiveCamera(60,W/H,.1,200);
  CM.position.z=9;
  const N=3500,geo=new THREE.BufferGeometry(),pos=new Float32Array(N*3),col=new Float32Array(N*3);
  const cs=[new THREE.Color('#FF6B2B'),new THREE.Color('#E8490F'),new THREE.Color('#FF9B6B'),new THREE.Color('#FFD166'),new THREE.Color('#FFF8F0')];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=5+Math.random()*14;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);pos[i*3+2]=r*Math.cos(ph)-2;
    const c=cs[Math.floor(Math.random()*cs.length)];col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:.04,vertexColors:true,transparent:true,opacity:.75,sizeAttenuation:true}));
  SC.add(pts);
  const rings=[];
  [[4,.004,0xFF9B6B,.06],[6,.006,0xFF6B2B,.09],[8.5,.007,0xE8490F,.07]].forEach(([r,t,c,o])=>{
    const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,6,120),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o}));
    m.rotation.x=Math.random()*Math.PI;m.rotation.y=Math.random()*Math.PI;SC.add(m);rings.push(m);
  });
  const ico=new THREE.Mesh(new THREE.IcosahedronGeometry(2.2,1),new THREE.MeshBasicMaterial({color:0xFF6B2B,wireframe:true,transparent:true,opacity:.04}));
  ico.position.set(4,1,-3);SC.add(ico);
  let mx2=0,my2=0,cx2=0,cy2=0;
  document.addEventListener('mousemove',e=>{mx2=(e.clientX/W-.5)*2;my2=-(e.clientY/H-.5)*2;});
  const clk=new THREE.Clock();
  (function tick(){
    requestAnimationFrame(tick);
    const t=clk.getElapsedTime();
    cx2+=(mx2*.3-cx2)*.025;cy2+=(my2*.25-cy2)*.025;
    CM.position.x=cx2;CM.position.y=cy2;CM.lookAt(0,0,0);
    pts.rotation.y=t*.03;pts.rotation.x=t*.015;
    rings.forEach((r,i)=>{r.rotation.z=t*(.06+i*.025);r.rotation.x=Math.sin(t*.1+i)*.5;});
    ico.rotation.y=t*.06;ico.rotation.x=t*.04;
    R.render(SC,CM);
  })();
  window.addEventListener('resize',()=>{const nw=innerWidth,nh=innerHeight;CM.aspect=nw/nh;CM.updateProjectionMatrix();R.setSize(nw,nh);});
})();

/* CURSOR */
const cdot=document.getElementById('cdot'),cring=document.getElementById('cring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function tick(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;cdot.style.left=mx+'px';cdot.style.top=my+'px';cring.style.left=rx+'px';cring.style.top=ry+'px';requestAnimationFrame(tick);})();
document.querySelectorAll('a,button,.s1-cta,.arr,.dot,.s4-cell,.row,.s7-row,.s8-a,.s6-pill,.s1-card,.s3-card').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
});

/* LOADER */
const lf2=document.getElementById('lf'),lpct=document.getElementById('lpct'),lstage=document.getElementById('lstage');
const stgs=['INIT SYSTÈME','MOTEUR 3D','ASSETS...','PRÊT'];
let pct=0,si=0;
const iv=setInterval(()=>{
  pct+=Math.random()*5+2.5;if(pct>=100){pct=100;clearInterval(iv);}
  lf2.style.width=pct+'%';lpct.textContent=Math.floor(pct)+'%';
  const ni=Math.floor(pct/26);if(ni>si&&si<stgs.length-1){si++;lstage.textContent=stgs[si];}
  if(pct>=100){setTimeout(()=>{const l=document.getElementById('loader');l.style.transition='opacity .8s';l.style.opacity='0';setTimeout(()=>{l.remove();showTut();},800);},400);}
},38);

function showTut(){requestAnimationFrame(()=>document.getElementById('tut').classList.add('show'));}
document.getElementById('tutok').addEventListener('click',()=>{const t=document.getElementById('tut');t.style.transition='opacity .5s';t.style.opacity='0';setTimeout(()=>t.remove(),500);});

/* SLIDES */
const slides=document.querySelectorAll('.slide');
const dots=document.querySelectorAll('.dot');
const al=document.getElementById('al'),ar=document.getElementById('ar');
const nc=document.getElementById('nc'),np2=document.getElementById('np');
const TOTAL=slides.length,NUMS=['01','02','03','04','05','06','07','08'];
let cur=0,busy=false;
const DUR=650;

function setReveal(slide,on){
  slide.querySelectorAll('.rv,.rvL,.rvR').forEach(el=>on?el.classList.add('in'):el.classList.remove('in'));
}

function goTo(next,dir){
  if(busy||next===cur||next<0||next>=TOTAL)return;
  busy=true;
  const from=slides[cur],to=slides[next];
  to.style.transition='none';
  to.style.transform=dir>0?'translateX(65px)':'translateX(-65px)';
  to.style.opacity='0';to.style.visibility='visible';to.style.pointerEvents='none';
  setReveal(to,false);
  to.getBoundingClientRect();
  from.style.transition='opacity '+DUR+'ms cubic-bezier(.4,0,.2,1),transform '+DUR+'ms cubic-bezier(.4,0,.2,1)';
  from.style.transform=dir>0?'translateX(-65px)':'translateX(65px)';
  from.style.opacity='0';from.classList.remove('is-active');
  to.style.transition='opacity '+DUR+'ms cubic-bezier(.16,1,.3,1),transform '+DUR+'ms cubic-bezier(.16,1,.3,1)';
  to.style.transform='translateX(0)';to.style.opacity='1';to.classList.add('is-active');
  cur=next;
  nc.textContent=NUMS[cur];
  np2.style.width=((cur+1)/TOTAL*100)+'%';
  dots.forEach((d,i)=>d.classList.toggle('on',i===cur));
  al.classList.toggle('off',cur===0);ar.classList.toggle('off',cur===TOTAL-1);
  setTimeout(()=>setReveal(to,true),80);
  setTimeout(()=>{
    from.style.transition='none';from.style.transform='translateX(0)';
    from.style.opacity='0';from.style.visibility='hidden';from.style.pointerEvents='none';
    to.style.pointerEvents='all';busy=false;
  },DUR+60);
}

setTimeout(()=>setReveal(slides[0],true),200);
al.addEventListener('click',()=>goTo(cur-1,-1));
ar.addEventListener('click',()=>goTo(cur+1,1));
document.getElementById('startbtn').addEventListener('click',()=>goTo(1,1));
dots.forEach(d=>d.addEventListener('click',()=>{const i=+d.dataset.i;goTo(i,i>cur?1:-1);}));
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(cur+1,1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(cur-1,-1);});
let ts=0;
document.addEventListener('touchstart',e=>{ts=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-ts;if(Math.abs(dx)>50){dx<0?goTo(cur+1,1):goTo(cur-1,-1);}},{passive:true});
<\/script>
